<!DOCTYPE html>
<html lang="vi">
<head>
    
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Chúc Mừng Sinh Nhật Mie</title>
    <style>
        :root {
            --birthday-pink: #ff7dd9;
            --birthday-cyan: #7ef0ff;
            --birthday-gold: #ffe37a;
            --text-glow-1: 0 0 8px rgba(255, 125, 217, 0.85), 0 0 18px rgba(126, 240, 255, 0.55);
            --text-glow-2: 0 0 16px rgba(255, 125, 217, 0.95), 0 0 34px rgba(126, 240, 255, 0.75);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            min-height: 100%;
            overflow: hidden;
        }

        body {
            background: radial-gradient(circle at top left, rgba(255, 112, 225, 0.20), transparent 25%),
                        radial-gradient(circle at bottom right, rgba(64, 240, 255, 0.14), transparent 22%),
                        linear-gradient(135deg, #14002a 0%, #5e1f8d 40%, #ff5abc 100%);
            min-height: 100vh;
            min-height: 100dvh;
            font-family: Arial, sans-serif;
            position: relative;
            touch-action: manipulation;
        }

        /* Start Button */
        #startButton {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2000;
            background: linear-gradient(135deg, var(--birthday-cyan), var(--birthday-pink));
            color: #111;
            padding: clamp(14px, 2.2vw, 24px) clamp(20px, 3vw, 36px);
            font-size: clamp(1rem, 2.3vw, 1.5rem);
            border: none;
            border-radius: 999px;
            cursor: pointer;
            box-shadow: 0 0 24px rgba(126, 240, 255, 0.35), 0 0 40px rgba(255, 125, 217, 0.18);
            transition: transform 0.2s ease-in-out, box-shadow 0.2s ease-in-out, filter 0.2s ease;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        #startButton:hover {
            transform: translate(-50%, -50%) scale(1.06);
            filter: brightness(1.05);
        }

        /* Digital Rain */
        .digital-rain {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 30% 20%, rgba(255, 165, 234, 0.14), transparent 24%),
                        radial-gradient(circle at 80% 75%, rgba(120, 245, 255, 0.10), transparent 18%),
                        linear-gradient(to bottom, rgba(255, 255, 255, 0.05), rgba(0, 0, 0, 0));
            overflow: hidden;
            z-index: 1;
        }

        .rain-drop {
            position: absolute;
            font-family: 'Courier New', monospace;
            color: rgba(255, 255, 255, 0.92);
            text-shadow: 0 0 12px rgba(255, 255, 255, 0.28);
            font-size: 14px;
            animation: rainFall 2.6s linear infinite;
        }

        @keyframes rainFall {
            0% {
                transform: translateY(-100%);
            }
            100% {
                transform: translateY(100vh);
            }
        }

        /* Music Controls */
        .music-controls {
            position: fixed;
            top: 12px;
            right: 12px;
            z-index: 1000;
            background: rgba(12, 4, 36, 0.72);
            backdrop-filter: blur(12px);
            padding: 12px;
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.18);
            color: var(--birthday-cyan);
            font-size: clamp(10px, 1.6vw, 12px);
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-width: min(92vw, 280px);
        }

        .volume-control input[type="range"] {
            width: 100%;
            accent-color: var(--neon-blue);
        }

        /* Main Content */
        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            min-height: 100dvh;
            width: 100%;
            position: relative;
            z-index: 10;
            padding: 16px;
        }

        .content {
            text-align: center;
            color: white;
            position: relative;
            width: 100%;
            height: min(100vh, 100vw);
            height: min(100dvh, 100vw);
            max-height: 100vh;
            max-height: 100dvh;
            overflow: hidden;
        }

        .content-layer {
            position: absolute;
            inset: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            visibility: hidden;
            transform: scale(0.97);
            transition: opacity 0.9s ease, transform 0.9s ease, visibility 0.9s ease;
            pointer-events: none;
            will-change: opacity, transform;
        }

        .content-layer.active {
            opacity: 1;
            visibility: visible;
            transform: scale(1);
        }

        @keyframes textGlow {
            0%, 100% {
                text-shadow: var(--text-glow-1);
            }
            50% {
                text-shadow: var(--text-glow-2);
            }
        }

        .countdown, .text-display, .star-display, .image-display {
            font-weight: bold;
            text-align: center;
            width: 100%;
            padding: 0 clamp(16px, 4vw, 28px);
            line-height: 1.3;
            word-break: break-word;
        }

        .countdown {
            color: #ffffff;
            text-shadow: var(--text-glow-2);
        }

        .text-display, .star-display {
            color: transparent;
            background: linear-gradient(135deg, var(--birthday-pink), var(--birthday-cyan));
            -webkit-background-clip: text;
            background-clip: text;
            text-shadow: 0 0 18px rgba(255, 255, 255, 0.3);
            animation: textGlow 2.2s infinite ease-in-out;
        }

        .image-display {
            width: min(94vw, 1200px);
            height: min(88vh, 900px);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px;
        }

        .image-display img {
            width: 100%;
            height: 100%;
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.14);
            box-shadow: 0 0 28px rgba(255, 115, 218, 0.18), 0 0 55px rgba(126, 240, 255, 0.22);
            transition: transform 0.8s ease, opacity 0.8s ease, box-shadow 0.8s ease;
            transform: scale(0.98);
        }

        .image-display.active img {
            transform: scale(1);
        }


        @media (max-width: 768px) {
            .music-controls {
                top: auto;
                bottom: 12px;
                right: 12px;
                left: 12px;
                max-width: none;
            }

            .countdown, .text-display {
                font-size: 1.8rem !important;
            }

            .image-display {
                width: 100%;
                height: 72vh;
                height: 72dvh;
                padding: 8px;
            }
        }

        @media (max-width: 480px) {
            .countdown, .text-display {
                font-size: 1.35rem !important;
            }

            .music-controls {
                padding: 10px;
            }
        }

        /* Star Canvas */
        #starCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
        }
    </style>
</head>

<body>
    <div id="startButton">Bắt đầu</div>

    <canvas id="starCanvas"></canvas>

    <div class="digital-rain"></div>

    <div class="music-controls">
        <div>Đang phát: Birthday Song</div>
        <div class="volume-control">
            <label for="volumeSlider">Âm lượng:</label>
            <input type="range" id="volumeSlider" min="0" max="100" value="50">
        </div>
        <audio id="backgroundMusic" src="ĐÂY LÀ BÀI HÁT SINH NHẬT.mp3" loop preload="auto" playsinline></audio>
    </div>

    <div class="container">
        <div class="content">
            <div id="countdown" class="countdown content-layer"></div>
            <div id="textDisplay" class="text-display content-layer"></div>
            <div id="starDisplay" class="star-display content-layer">⭐</div>
            <div id="imageDisplay" class="image-display content-layer"></div>
        </div>
    </div>

    <script src="effects.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const startButton = document.getElementById('startButton');
            const backgroundMusic = document.getElementById('backgroundMusic');
            const volumeSlider = document.getElementById('volumeSlider');
            const digitalRainContainer = document.querySelector('.digital-rain');

            const countdownElement = document.getElementById('countdown');
            const textDisplayElement = document.getElementById('textDisplay');
            const starDisplayElement = document.getElementById('starDisplay');
            const imageDisplayElement = document.getElementById('imageDisplay');

            const confettiChars = ['🎈', '✨', '🎁', '💖', '🌟', '🥳', '🎂'];
            const rainDrops = [];
            const NUMBER_OF_RAIN_DROPS = 48;
            for (let i = 0; i < NUMBER_OF_RAIN_DROPS; i++) {
                const drop = document.createElement('div');
                drop.className = 'rain-drop';
                drop.style.left = Math.random() * 100 + 'vw';
                drop.style.top = `${-Math.random() * 25}vh`;
                drop.style.opacity = 0.9;
                drop.style.fontSize = `${12 + Math.random() * 10}px`;
                drop.style.animationDuration = `${2.4 + Math.random() * 1.2}s`;
                drop.style.animationDelay = `-${Math.random() * 2}s`;
                drop.style.color = `hsl(${320 + Math.random() * 200}, 100%, 84%)`;
                drop.textContent = confettiChars[Math.floor(Math.random() * confettiChars.length)];
                digitalRainContainer.appendChild(drop);
                rainDrops.push(drop);
            }

            volumeSlider.addEventListener('input', (e) => {
                backgroundMusic.volume = Math.max(0, Math.min(1, e.target.value / 100));
            });
            backgroundMusic.volume = 0.5;

            function getResponsiveFontSize(fontSize) {
                const width = window.innerWidth;
                const scale = width <= 480 ? 0.7 : width <= 768 ? 0.85 : 1;
                const match = String(fontSize).match(/^(\d*\.?\d+)(rem|px)$/);
                if (match) {
                    return `${Number(match[1]) * scale}${match[2]}`;
                }
                return fontSize;
            }

            let currentDisplayState = null;

            function applyDisplayState(item) {
                if (!item) return;

                if (item.type === 'countdown') {
                    countdownElement.textContent = item.text;
                    countdownElement.style.fontSize = getResponsiveFontSize(item.fontSize);
                    currentDisplayState = { type: 'countdown', fontSize: item.fontSize };
                } else if (item.type === 'text') {
                    textDisplayElement.textContent = item.text;
                    textDisplayElement.style.fontSize = getResponsiveFontSize(item.fontSize);
                    currentDisplayState = { type: 'text', fontSize: item.fontSize };
                }
            }

            window.addEventListener('resize', () => {
                if (!currentDisplayState) return;
                if (currentDisplayState.type === 'countdown') {
                    countdownElement.style.fontSize = getResponsiveFontSize(currentDisplayState.fontSize);
                } else if (currentDisplayState.type === 'text') {
                    textDisplayElement.style.fontSize = getResponsiveFontSize(currentDisplayState.fontSize);
                }
            });

            const introSequence = [
                { text: '3', fontSize: '8rem', duration: 1000, type: 'countdown' },
                { text: '2', fontSize: '8rem', duration: 1000, type: 'countdown' },
                { text: '1', fontSize: '8rem', duration: 1000, type: 'countdown' },
                { text: '🎉 Happy Birthday 🎉', fontSize: '4rem', duration: 3800, type: 'text' },
            ];

            const textSlides = [
                { text: 'Huỳnh Thị Thùy Lâm (7 Black)', fontSize: '4.5rem', duration: 4200, type: 'text' },
                { text: '📅 16/07/2026', fontSize: '3.2rem', duration: 4200, type: 'text' },
                { text: '🎂 18 tuổi rực rỡ', fontSize: '3.2rem', duration: 4200, type: 'text' },
                { text: 'Chúc mừng sinh nhật Mee nha!', fontSize: '3.2rem', duration: 4200, type: 'text' },
                { text: 'Tuổi mới thật Hạnh phúc, may mắn và thành công hơn!', fontSize: '3rem', duration: 4200, type: 'text' },
                { text: 'Gác lại nỗi buồn của tuổi 17, mở ra một chương thật mới.', fontSize: '3rem', duration: 4200, type: 'text' },
                { text: 'Chuẩn bị hành trang vững vàng cho quãng thời gian đầy thử thách nhưng cũng thật đáng mong chờ.', fontSize: '3rem', duration: 4200, type: 'text' },
                { text: 'Cầu chúc Mee luôn tràn đầy năng lượng và luôn là phiên bản tuyệt nhất.', fontSize: '3rem', duration: 4200, type: 'text' }
            ];

            const imageSequence = [
                'src/14.jpg',
                'src/2.jpg',
                'src/3.jpg',
                'src/4.jpg',
                'src/5.jpg',
                'src/6.jpg',
                'src/7.jpg',
                'src/8.jpg',
                'src/10.jpg',
                'src/11.jpg',
                'src/12.jpg',
                'src/13.jpg',
                'src/1.jpg',
                'src/15.jpg',
                'src/16.jpg',
                'src/17.jpg',
                'src/18.jpg',
                'src/19.jpg',
                'src/20.jpg',
                'src/21.jpg',
                'src/22.jpg',
                'src/23.jpg',
                'src/24.jpg',
                'src/26.jpg',
                'src/27.jpg',
                'src/28.jpg',
                'src/29.jpg',
 //               'src/30.jpg',
                'src/31.jpg'
            ].map((src) => ({
                src: `./${src.replace(/^\/+/, '')}`,
                duration: 3600,
                type: 'image'
            }));

            const mainSequence = [];
            const maxSlides = Math.max(textSlides.length, imageSequence.length);
            for (let i = 0; i < maxSlides; i++) {
                if (textSlides[i]) mainSequence.push(textSlides[i]);
                if (imageSequence[i]) mainSequence.push(imageSequence[i]);
            }

            let introIndex = 0;
            let mainIndex = 0;
            let currentPhase = 'intro';
            let initialStarDisplayDelay = 2800;
            let slideshowTimer = null;

            function clearActiveLayers() {
                [countdownElement, textDisplayElement, starDisplayElement, imageDisplayElement].forEach((element) => {
                    element.classList.remove('active');
                });
            }

            function resolveAssetPath(src) {
                if (!src) return src;
                const normalized = String(src).trim().replace(/\\/g, '/');
                if (/^https?:\/\//i.test(normalized)) return normalized;
                const relative = normalized.startsWith('./') || normalized.startsWith('/') ? normalized : `./${normalized.replace(/^\/+/, '')}`;
                return new URL(relative, window.location.href).href;
            }

            function preloadImages(imageList) {
                const limitedList = (imageList || []).slice(0, 6);
                return Promise.all(limitedList.map((src) => new Promise((resolve) => {
                    const img = new Image();
                    img.decoding = 'async';
                    img.onload = () => resolve(src);
                    img.onerror = () => resolve(src);
                    img.src = resolveAssetPath(src);
                })));
            }

            function displayNextSequenceItem() {
                let currentItem;

                if (currentPhase === 'intro') {
                    currentItem = introSequence[introIndex];
                    introIndex += 1;

                    if (introIndex >= introSequence.length) {
                        currentPhase = 'main';
                        mainIndex = 0;
                    }
                } else {
                    currentItem = mainSequence[mainIndex];
                    mainIndex = (mainIndex + 1) % mainSequence.length;
                }

                clearActiveLayers();

                let activeLayer = null;

                switch (currentItem.type) {
                    case 'countdown':
                        applyDisplayState(currentItem);
                        activeLayer = countdownElement;
                        break;
                    case 'text':
                        applyDisplayState(currentItem);
                        activeLayer = textDisplayElement;
                        break;
                    case 'star-display':
                        starDisplayElement.textContent = '⭐';
                        activeLayer = starDisplayElement;
                        break;
                    case 'image':
                        imageDisplayElement.innerHTML = '';
                        const img = document.createElement('img');
                        img.src = resolveAssetPath(currentItem.src);
                        img.alt = 'Birthday Image';
                        img.decoding = 'async';
                        img.loading = 'eager';
                        img.style.opacity = '1';
                        imageDisplayElement.appendChild(img);
                        activeLayer = imageDisplayElement;
                        break;
                }

                if (activeLayer) {
                    requestAnimationFrame(() => {
                        activeLayer.classList.add('active');
                    });
                }

                if (slideshowTimer) {
                    clearTimeout(slideshowTimer);
                }
                slideshowTimer = setTimeout(displayNextSequenceItem, currentItem.duration + 900);
            }

            startButton.addEventListener('click', async () => {
                startButton.style.display = 'none';
                window.startStarAnimation();

                try {
                    await backgroundMusic.play();
                } catch (error) {
                    console.warn('Audio autoplay was blocked or unavailable:', error);
                }

                const imageSources = imageSequence.map((item) => item.src);
                await preloadImages(imageSources);
                setTimeout(displayNextSequenceItem, initialStarDisplayDelay);
            });
        });
    </script>
</body>
</html>
